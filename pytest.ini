[pytest]
#配置常用运行参数
;addopts = -vs --alluredir=allure-results
#配置测试用例位置
testpaths = ./testcases
#配置模块名的规则
python_files = test_*.py
#配置类的规则
python_classes = Test*
#配置测试用例（方法）的规则
python_functions = test_*

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s - %(levelname)s - %(message)s

markers =
    smoke: 冒烟测试（P0 核心用例）
    golden: 黄金集门禁
    model_comparison: 模型对比测试（需要本地 Ollama，CI 跳过）
    timeout: 用于设置测试用例的超时时间（单位：秒），防止测试hang住