name: Agent Test Pipeline

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # 黄金集门禁（必须通过）
  golden-test:
    name: Golden Set Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run golden set
        run: pytest testcases/test_golden.py -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

  # 单元测试 + Mock（必须通过）
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run unit tests
        run: pytest testcases/test_react_unit.py -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

  # 能力测试（LLM Judge，允许失败，不阻断）
  capability-test:
    name: Capability Tests (LLM Judge)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run capability tests
        run: pytest testcases/test_react_integration.py -v -k "capability" --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

  # 全量集成测试（依赖黄金集和单元测试通过）
  integration-test:
    name: Full Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [golden-test, unit-test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run integration tests
        run: pytest testcases/test_react_integration.py -v --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}