name: Agent Test Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: '0 2 * * *'  # 每日凌晨 2 点（Nightly）
  workflow_dispatch:      # 手动触发（能力测试）

jobs:
  # ========== 1. MR 阶段：单元测试 ==========
  unit-test:
    name: 单元测试 + Mock
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run unit tests
        run: pytest testcases/test_react_unit.py -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

  # ========== 2. MR 阶段：Smoke 冒烟测试（依赖 unit-test）==========
  smoke-test:
    name: Smoke 冒烟测试（100% 必过）
    runs-on: ubuntu-latest
    needs: unit-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run smoke tests
        run: pytest testcases/test_react_integration.py -m smoke -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

  # ========== 3. 测试环境：Golden 门禁（依赖 smoke-test，push 后自动触发）==========
  golden-test-env:
    name: Golden 门禁（测试环境，100% 必过）
    runs-on: ubuntu-latest
    needs: smoke-test
    if: github.event_name == 'push'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run golden tests
        run: pytest testcases/test_golden.py -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

  # ========== 4a. 预发布阶段：Golden Double Confirm ==========
  golden-double:
    name: Golden Double Confirm（预发布门禁）
    runs-on: ubuntu-latest
    needs: golden-test-env
    if: github.event_name == 'push' && needs.golden-test-env.result == 'success'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Golden Double Confirm
        run: pytest testcases/test_golden.py -v
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

  # ========== 4b. 预发布阶段：Full 全量回归 ==========
  full-pre-release:
    name: Full 全量回归（预发布验证）
    runs-on: ubuntu-latest
    needs: golden-double  # 依赖 Golden Double 成功
    if: github.event_name == 'push' && needs.golden-double.result == 'success'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Full 全量回归
        run: pytest testcases/test_react_integration.py -v --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}

  # ========== 5. Nightly（定时，全量集成 + 能力报告）==========
  nightly-test:
    name: Nightly 全量集成测试
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run full tests with report
        run: pytest testcases/test_react_integration.py -v --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-report
          path: reports/

  # ========== 6. 手动按需：能力测试（LLM Judge）==========
  capability-test:
    name: 能力测试（LLM Judge）
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout openai langsmith pyyaml python-dotenv requests
      - name: Run capability tests
        run: pytest testcases/test_react_integration.py -k "capability" -v --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}