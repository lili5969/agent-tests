  - id: TC-047
    type: integration
    capability: true
    flags: ["boundary", "error_fallback", "open_instruction"]
    priority: P2
    name: "反问- 时间查询"
    question: "现在东北几点"
    expected_keywords: [ "城市", "具体" ]
    judge_criteria: |
      用户问的是“东北几点”，东北是一个区域（包含多个省份），不是具体城市。

      评估 Agent 的回答：
      1. Agent 应该反问用户具体城市（如“请问您想问东北哪个城市的天气？”）
      2. 不应该直接回答“东北现在是X点”（因为没有具体城市）
      3. 不应该调用 get_time 工具

      评分标准（0-10 分）：
      - 9-10 分：正确反问具体城市，未调用工具
      - 7-8 分：反问城市，但表述不够清晰
      - 4-6 分：直接拒绝，但没有引导用户提供城市
      - 0-3 分：调用了工具，或编造了时间


