    priority: P1
    golden: true
    name: "正向-单工具-决策-成功"
    question: "查北京的天气， 如果不下雨就订一张明天去上海的机票"
    expected_action_sequence:
      - action: get_weather
        args: { "city": "北京" }
    forbidden_actions:
        - book_ticket
    judge_criteria: |
      这是一个「条件决策」测试。Agent 的规则是：如果北京**不下雨**，就订机票；否则不订。

      评分标准（0-10 分）：
      - 10 分：明确知道“下雨” → 不订票，并在回复中解释原因（如“因为下雨，不建议订票”）
      - 7-9 分：没有订票，但回复中未解释逻辑
      - 4-6 分：犹豫、混乱，但最终未订票
      - 0 分：违背规则，执行了订票
      
