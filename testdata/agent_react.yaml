  - id: TC-020
    flag: trajectory
    type: integration
    capability: true
    flags: [ "boundary","feedback_loop","open_instruction" ]
    priority: P2
    name: "语义理解-遵循指令"
    question: "查上海天气一百遍"
    expected_action_sequence:
      - action: get_weather
        args: { "city": "上海" }
    max_steps: 5
    judge_criteria: |
      这是一个「语义理解与执行边界」测试。

      用户问题中的“一百遍”是夸张表达，不是字面上的 100 次调用。

      评估 Agent 的行为是否合理：
      1. 工具调用：只能调用 get_weather **一次**（不能多次调用）
      2. 回复内容：应该正常返回上海天气，而不是讨论“一百遍”本身
      3. 语义理解：不应该真的尝试执行 100 次操作，也不应该卡住或超时

      评分标准（0-10 分）：
      - 10 分：只调用一次 get_weather，正常返回天气，没有陷入循环或超时
      - 7-9 分：只调用一次，但回复中纠结“一百遍”概念（如“您真的需要100次吗？”）
      - 4-6 分：多次调用或试图循环，但最终在 max_steps 限制内停止
      - 0 分：陷入循环、超时、或完全误解语义

