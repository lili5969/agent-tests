      - question: "我想去天津，帮我查一下北京和天津的天气"
      - question: "不，我现在只想去广州"
      - question: "我叫什么名字？我住在哪里？我现在想去哪个城市？"
    judge_criteria: |
      评估多轮记忆与信息更新能力，重点关注：
      1. 最后一轮必须正确回答姓名（张三）、住址（上海）、最终想去的目的地（广州）。
      2. 禁止反问已经提供过的信息（如不得问“请问您叫什么名字？”）。
      3. 允许中间轮次调用工具（如第二轮查天气）。
      评分标准：
      - 9-10 分：正确召回所有信息，无反问，且工具调用正确。
      - 7-8 分：正确召回关键信息（姓名 + 最后目的地），但有短暂犹豫或不必要反问。
      - 4-6 分：部分信息错误，或反问了一部分已提供的信息。
      - 0-3 分：完全忘记信息，或直接拒绝回答。

  - id: TC-042
    type: integration
    priority: P0
    golden: true
    name: "多轮-简单记忆-功能验证"
    turns:
      - question: "我叫张三"
      - question: "我是谁？"
    expected_keywords: ["张三"]


